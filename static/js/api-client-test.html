<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Client Tests</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .output {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
            color: #333;
        }

        .test-result {
            margin-bottom: 15px;
            padding: 12px;
            border-left: 4px solid;
            background: #fafafa;
            border-radius: 4px;
        }

        .test-result.pass {
            border-left-color: #4caf50;
            background: #f1f8f6;
            color: #1b5e20;
        }

        .test-result.fail {
            border-left-color: #f44336;
            background: #ffebee;
            color: #b71c1c;
        }

        .test-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .test-error {
            font-size: 0.85em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            text-align: center;
        }

        .summary-item h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .summary-item .value {
            font-size: 2em;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .test-filter {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .test-filter input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .test-filter input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        @media (max-width: 600px) {
            .summary {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 API Client Test Suite</h1>
            <p>Comprehensive test runner for Agentic RAG JavaScript API client</p>
        </header>

        <div class="content">
            <div class="controls">
                <button onclick="runTests()">Run All Tests</button>
                <button onclick="clearOutput()">Clear Output</button>
            </div>

            <div class="test-filter">
                <input 
                    type="text" 
                    id="filterInput" 
                    placeholder="Filter tests by name..."
                    onkeyup="filterTests()"
                >
            </div>

            <div id="summary" class="summary" style="display: none;">
                <div class="summary-item">
                    <h3>Total Tests</h3>
                    <div class="value" id="totalTests">0</div>
                </div>
                <div class="summary-item">
                    <h3>Passed</h3>
                    <div class="value" id="passedTests" style="color: #4caf50;">0</div>
                </div>
                <div class="summary-item">
                    <h3>Failed</h3>
                    <div class="value" id="failedTests" style="color: #f44336;">0</div>
                </div>
            </div>

            <div id="output" class="output">
                <p style="color: #999; text-align: center;">Click "Run All Tests" to start</p>
            </div>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script src="api-client-test.js"></script>
    <script>
        let testResults = [];

        async function runTests() {
            const outputDiv = document.getElementById('output');
            const summaryDiv = document.getElementById('summary');
            
            outputDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Running tests...</p></div>';
            summaryDiv.style.display = 'none';

            // Capture test results
            const originalTests = TestRunner.tests;
            TestRunner.tests = originalTests;
            TestRunner.passed = 0;
            TestRunner.failed = 0;
            testResults = [];

            const originalLog = console.log;
            const originalError = console.error;

            console.log = () => {}; // Suppress test output
            console.error = () => {};

            let testIndex = 0;
            for (const test of TestRunner.tests) {
                try {
                    await test.fn();
                    TestRunner.passed++;
                    testResults.push({
                        name: test.name,
                        status: 'pass',
                        error: null
                    });
                } catch (error) {
                    TestRunner.failed++;
                    testResults.push({
                        name: test.name,
                        status: 'fail',
                        error: error.message
                    });
                }
                testIndex++;
            }

            console.log = originalLog;
            console.error = originalError;

            displayResults();
        }

        function displayResults() {
            const outputDiv = document.getElementById('output');
            const summaryDiv = document.getElementById('summary');

            let html = '';
            for (const result of testResults) {
                const status = result.status;
                const icon = status === 'pass' ? '✓' : '✗';
                
                html += `<div class="test-result ${status}">
                    <div class="test-name">${icon} ${result.name}</div>
                    ${result.error ? `<div class="test-error">${result.error}</div>` : ''}
                </div>`;
            }

            outputDiv.innerHTML = html;

            // Update summary
            document.getElementById('totalTests').textContent = testResults.length;
            document.getElementById('passedTests').textContent = TestRunner.passed;
            document.getElementById('failedTests').textContent = TestRunner.failed;
            summaryDiv.style.display = 'grid';
        }

        function filterTests() {
            const filterValue = document.getElementById('filterInput').value.toLowerCase();
            const testDivs = document.querySelectorAll('.test-result');

            testDivs.forEach(div => {
                const testName = div.querySelector('.test-name').textContent.toLowerCase();
                div.style.display = testName.includes(filterValue) ? 'block' : 'none';
            });
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '<p style="color: #999; text-align: center;">Output cleared</p>';
            document.getElementById('summary').style.display = 'none';
            document.getElementById('filterInput').value = '';
            testResults = [];
        }

        // Auto-run tests on load if query param is present
        if (new URLSearchParams(window.location.search).has('autorun')) {
            window.addEventListener('load', runTests);
        }
    </script>
</body>
</html>
