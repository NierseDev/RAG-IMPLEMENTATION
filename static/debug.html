<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Debug Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: #1e1e2e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: rgba(102, 126, 234, 0.1);
            padding: 20px 30px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title h1 {
            font-size: 1.5em;
            color: #e2e8f0;
            font-weight: 600;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-header {
            padding: 8px 16px;
            background: rgba(102, 126, 234, 0.2);
            color: #a5b4fc;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-header:hover {
            background: rgba(102, 126, 234, 0.3);
            color: #e2e8f0;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message.assistant .message-avatar {
            background: rgba(74, 222, 128, 0.2);
        }
        
        .message.system .message-avatar {
            background: rgba(251, 191, 36, 0.2);
        }
        
        .message-content {
            flex: 1;
            max-width: 70%;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
            padding: 14px 18px;
        }
        
        .message.assistant .message-content {
            background: #2d2d3d;
            color: #e2e8f0;
            border-radius: 18px 18px 18px 4px;
            padding: 14px 18px;
        }
        
        .message.system .message-content {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
            opacity: 0.7;
        }
        
        .message-text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .debug-panel {
            margin-top: 10px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        
        .debug-title {
            color: #a78bfa;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        
        .debug-content {
            color: #94a3b8;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .debug-item {
            margin: 4px 0;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            border-left: 2px solid #667eea;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
            color: #a5b4fc;
        }
        
        .sources-list {
            margin-top: 10px;
        }
        
        .source-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            margin: 6px 0;
            border-radius: 6px;
            font-size: 13px;
            border-left: 3px solid #4ade80;
        }
        
        .source-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            color: #4ade80;
            font-weight: 600;
        }
        
        .source-text {
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .chat-input-container {
            padding: 20px;
            background: #2d2d3d;
            border-top: 2px solid rgba(102, 126, 234, 0.3);
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .input-controls {
            flex: 1;
        }
        
        .chat-input {
            width: 100%;
            padding: 14px 18px;
            background: #1e1e2e;
            border: 2px solid #3d3d5c;
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-options {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        
        .option-select {
            padding: 6px 12px;
            background: #1e1e2e;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
        }
        
        .btn-send {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            min-width: 100px;
        }
        
        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        
        .collapsible {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .collapsible.expanded {
            max-height: 500px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3d3d5c;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d6c;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="status-indicator"></div>
                <h1>🤖 RAG Debug Console</h1>
            </div>
            <div class="header-actions">
                <button class="btn-header" onclick="toggleDebugMode()">
                    <span id="debug-mode-text">🐛 Debug: ON</span>
                </button>
                <button class="btn-header" onclick="clearChat()">🗑️ Clear</button>
                <button class="btn-header" onclick="window.location.href='/'">📊 Dashboard</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message system">
                <div class="message-avatar">⚙️</div>
                <div class="message-content">
                    <div class="message-text">
                        <strong>Debug Console Initialized</strong><br>
                        This is an interactive debugging interface for the RAG system. Ask questions and see detailed reasoning traces, retrieval results, and system diagnostics in real-time.
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="input-wrapper">
                <div class="input-controls">
                    <textarea 
                        class="chat-input" 
                        id="user-input" 
                        placeholder="Ask a question or type a debug command..."
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <div class="input-options">
                        <select class="option-select" id="query-mode">
                            <option value="agentic">🧠 Agentic Mode</option>
                            <option value="simple">⚡ Simple Mode</option>
                        </select>
                        <select class="option-select" id="top-k">
                            <option value="3">Top 3</option>
                            <option value="5">Top 5</option>
                            <option value="6" selected>Top 6</option>
                            <option value="10">Top 10</option>
                        </select>
                    </div>
                </div>
                <button class="btn-send" id="send-btn" onclick="sendMessage()">
                    Send
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        let debugMode = true;
        let messageCount = 0;
        
        function toggleDebugMode() {
            debugMode = !debugMode;
            document.getElementById('debug-mode-text').textContent = 
                debugMode ? '🐛 Debug: ON' : '🐛 Debug: OFF';
        }
        
        function clearChat() {
            if (confirm('Clear all messages?')) {
                const container = document.getElementById('chat-messages');
                container.innerHTML = `
                    <div class="message system">
                        <div class="message-avatar">⚙️</div>
                        <div class="message-content">
                            <div class="message-text">Chat cleared. Ready for new queries.</div>
                        </div>
                    </div>
                `;
                messageCount = 0;
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function addMessage(type, content, metadata = null) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            let avatar = '👤';
            if (type === 'assistant') avatar = '🤖';
            if (type === 'system') avatar = '⚙️';
            
            let html = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
            `;
            
            if (type === 'user') {
                html += `<div class="message-text">${escapeHtml(content)}</div>`;
            } else if (type === 'assistant') {
                html += `
                    <div class="message-header">
                        <span>Assistant</span>
                        <span>${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="message-text">${escapeHtml(content)}</div>
                `;
                
                if (metadata && debugMode) {
                    html += createDebugPanel(metadata);
                }
            } else {
                html += `<div class="message-text">${content}</div>`;
            }
            
            html += `</div>`;
            messageDiv.innerHTML = html;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            messageCount++;
        }
        
        function createDebugPanel(metadata) {
            let html = '<div class="debug-panel">';
            
            // Statistics
            html += `
                <div class="debug-title" onclick="toggleSection(this)">
                    📊 Statistics ▼
                </div>
                <div class="debug-content">
            `;
            
            if (metadata.mode === 'agentic') {
                html += `
                    <span class="badge">⚡ Iterations: ${metadata.iterations}</span>
                    <span class="badge">📚 Chunks: ${metadata.chunks}</span>
                    <span class="badge">⏱️ Time: ${metadata.time}s</span>
                `;
                
                if (metadata.confidence) {
                    const confPercent = (metadata.confidence * 100).toFixed(1);
                    const confColor = metadata.confidence >= 0.7 ? '#4ade80' : '#fbbf24';
                    html += `<span class="badge" style="background: ${confColor}20; color: ${confColor}">🎯 Confidence: ${confPercent}%</span>`;
                }
                
                if (metadata.verification !== undefined) {
                    const verifyColor = metadata.verification ? '#4ade80' : '#f87171';
                    html += `<span class="badge" style="background: ${verifyColor}20; color: ${verifyColor}">✓ Verified: ${metadata.verification}</span>`;
                }
            } else {
                html += `
                    <span class="badge">📚 Chunks: ${metadata.chunks}</span>
                `;
            }
            
            html += '</div>';
            
            // Reasoning Trace
            if (metadata.reasoning && metadata.reasoning.length > 0) {
                html += `
                    <div class="debug-title" onclick="toggleSection(this)">
                        🧠 Reasoning Trace ▼
                    </div>
                    <div class="debug-content collapsible">
                `;
                
                metadata.reasoning.forEach((step, idx) => {
                    html += `<div class="debug-item"><strong>Step ${idx + 1}:</strong> ${escapeHtml(step)}</div>`;
                });
                
                html += '</div>';
            }
            
            // Sources
            if (metadata.sources && metadata.sources.length > 0) {
                html += `
                    <div class="debug-title" onclick="toggleSection(this)">
                        📄 Sources (${metadata.sources.length}) ▼
                    </div>
                    <div class="debug-content collapsible">
                        <div class="sources-list">
                `;
                
                metadata.sources.forEach((source, idx) => {
                    const similarity = source.similarity ? (source.similarity * 100).toFixed(1) : 'N/A';
                    const sourceName = typeof source === 'string' ? source : source.source;
                    const sourceText = source.text || '';
                    
                    html += `
                        <div class="source-item">
                            <div class="source-header">
                                <span>📄 ${escapeHtml(sourceName)}</span>
                                <span>${similarity}%</span>
                            </div>
                            ${sourceText ? `<div class="source-text">${escapeHtml(sourceText)}</div>` : ''}
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            html += '</div>';
            return html;
        }
        
        function toggleSection(element) {
            const content = element.nextElementSibling;
            if (content.classList.contains('collapsible')) {
                content.classList.toggle('expanded');
                element.textContent = content.classList.contains('expanded') 
                    ? element.textContent.replace('▶', '▼')
                    : element.textContent.replace('▼', '▶');
            }
        }
        
        function addTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            
            if (!query) return;
            
            const mode = document.getElementById('query-mode').value;
            const topK = parseInt(document.getElementById('top-k').value);
            
            // Add user message
            addMessage('user', query);
            input.value = '';
            
            // Disable send button
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Processing...';
            
            // Show typing indicator
            addTypingIndicator();
            
            try {
                const endpoint = mode === 'agentic' ? '/query/agentic' : '/query/simple';
                const startTime = performance.now();
                
                const response = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        top_k: topK
                    })
                });
                
                const data = await response.json();
                const processingTime = ((performance.now() - startTime) / 1000).toFixed(2);
                
                removeTypingIndicator();
                
                if (response.ok) {
                    const metadata = {
                        mode: mode,
                        time: data.processing_time?.toFixed(2) || processingTime,
                        chunks: data.retrieved_chunks || 0,
                        iterations: data.iterations || 1,
                        confidence: data.confidence,
                        verification: data.verification_passed,
                        reasoning: data.reasoning_trace || [],
                        sources: data.sources || []
                    };
                    
                    addMessage('assistant', data.answer, metadata);
                } else {
                    addMessage('assistant', `Error: ${data.detail || 'Unknown error occurred'}`);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Network error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        document.getElementById('user-input').focus();
    </script>
</body>
</html>
