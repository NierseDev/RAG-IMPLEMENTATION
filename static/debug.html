<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Debug Chatbot</title>
    <link rel="stylesheet" href="/static/css/universal.css">
    <link rel="stylesheet" href="/static/css/debug.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="status-indicator"></div>
                <h1>🤖 RAG Debug Console</h1>
            </div>
            <div class="header-actions">
                <button class="btn-header" onclick="toggleDebugMode()">
                    <span id="debug-mode-text">🐛 Debug: ON</span>
                </button>
                <button class="btn-header" onclick="clearChat()">🗑️ Clear</button>
                <button class="btn-header" onclick="window.location.href='/'">📊 Dashboard</button>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message system">
                <div class="message-avatar">⚙️</div>
                <div class="message-content">
                    <div class="message-text">
                        <strong>Debug Console Initialized</strong><br>
                        This is an interactive debugging interface for the RAG system. Ask questions and see detailed reasoning traces, retrieval results, and system diagnostics in real-time.
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="input-wrapper">
                <div class="input-controls">
                    <textarea 
                        class="chat-input" 
                        id="user-input" 
                        placeholder="Ask a question or type a debug command..."
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <div class="input-options">
                        <select class="option-select" id="query-mode">
                            <option value="agentic">🧠 Agentic Mode</option>
                            <option value="simple">⚡ Simple Mode</option>
                        </select>
                        <select class="option-select" id="top-k">
                            <option value="3">Top 3</option>
                            <option value="5">Top 5</option>
                            <option value="6" selected>Top 6</option>
                            <option value="10">Top 10</option>
                        </select>
                    </div>
                </div>
                <button class="btn-send" id="send-btn" onclick="sendMessage()">
                    Send
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        let debugMode = true;
        let messageCount = 0;
        
        function toggleDebugMode() {
            debugMode = !debugMode;
            document.getElementById('debug-mode-text').textContent = 
                debugMode ? '🐛 Debug: ON' : '🐛 Debug: OFF';
        }
        
        function clearChat() {
            if (confirm('Clear all messages?')) {
                const container = document.getElementById('chat-messages');
                container.innerHTML = `
                    <div class="message system">
                        <div class="message-avatar">⚙️</div>
                        <div class="message-content">
                            <div class="message-text">Chat cleared. Ready for new queries.</div>
                        </div>
                    </div>
                `;
                messageCount = 0;
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function addMessage(type, content, metadata = null) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            let avatar = '👤';
            if (type === 'assistant') avatar = '🤖';
            if (type === 'system') avatar = '⚙️';
            
            let html = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
            `;
            
            if (type === 'user') {
                html += `<div class="message-text">${escapeHtml(content)}</div>`;
            } else if (type === 'assistant') {
                html += `
                    <div class="message-header">
                        <span>Assistant</span>
                        <span>${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="message-text">${escapeHtml(content)}</div>
                `;
                
                if (metadata && debugMode) {
                    html += createDebugPanel(metadata);
                }
            } else {
                html += `<div class="message-text">${content}</div>`;
            }
            
            html += `</div>`;
            messageDiv.innerHTML = html;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            messageCount++;
        }
        
        function createDebugPanel(metadata) {
            let html = '<div class="debug-panel">';
            
            // Statistics
            html += `
                <div class="debug-title" onclick="toggleSection(this)">
                    📊 Statistics ▼
                </div>
                <div class="debug-content">
            `;
            
            if (metadata.mode === 'agentic') {
                html += `
                    <span class="badge">⚡ Iterations: ${metadata.iterations}</span>
                    <span class="badge">📚 Chunks: ${metadata.chunks}</span>
                    <span class="badge">⏱️ Time: ${metadata.time}s</span>
                `;
                
                if (metadata.confidence) {
                    const confPercent = (metadata.confidence * 100).toFixed(1);
                    const confClass = metadata.confidence >= 0.7 ? 'badge-confidence-high' : 'badge-confidence-low';
                    html += `<span class="badge ${confClass}">🎯 Confidence: ${confPercent}%</span>`;
                }
                
                if (metadata.verification !== undefined) {
                    const verifyClass = metadata.verification ? 'badge-verification-true' : 'badge-verification-false';
                    html += `<span class="badge ${verifyClass}">✓ Verified: ${metadata.verification}</span>`;
                }
            } else {
                html += `
                    <span class="badge">📚 Chunks: ${metadata.chunks}</span>
                `;
            }
            
            html += '</div>';
            
            // Reasoning Trace
            if (metadata.reasoning && metadata.reasoning.length > 0) {
                html += `
                    <div class="debug-title" onclick="toggleSection(this)">
                        🧠 Reasoning Trace ▼
                    </div>
                    <div class="debug-content collapsible">
                `;
                
                metadata.reasoning.forEach((step, idx) => {
                    html += `<div class="debug-item"><strong>Step ${idx + 1}:</strong> ${escapeHtml(step)}</div>`;
                });
                
                html += '</div>';
            }
            
            // Sources
            if (metadata.sources && metadata.sources.length > 0) {
                html += `
                    <div class="debug-title" onclick="toggleSection(this)">
                        📄 Sources (${metadata.sources.length}) ▼
                    </div>
                    <div class="debug-content collapsible">
                        <div class="sources-list">
                `;
                
                metadata.sources.forEach((source, idx) => {
                    const similarity = source.similarity ? (source.similarity * 100).toFixed(1) : 'N/A';
                    const sourceName = typeof source === 'string'
                        ? source
                        : (source.document_name || source.title || source.filename || source.source || source.chunk_id || 'Unknown');
                    const sourceUrl = typeof source === 'object' && source && source.url ? source.url : '';
                    const sourceText = source.text || '';
                    
                    html += `
                        <div class="source-item">
                            <div class="source-header">
                                <span>📄 ${escapeHtml(sourceName)}</span>
                                <span>${similarity}%</span>
                            </div>
                            ${sourceUrl ? `<div class="source-url">${escapeHtml(sourceUrl)}</div>` : ''}
                            ${sourceText ? `<div class="source-text">${escapeHtml(sourceText)}</div>` : ''}
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            html += '</div>';
            return html;
        }
        
        function toggleSection(element) {
            const content = element.nextElementSibling;
            if (content.classList.contains('collapsible')) {
                content.classList.toggle('expanded');
                element.textContent = content.classList.contains('expanded') 
                    ? element.textContent.replace('▶', '▼')
                    : element.textContent.replace('▼', '▶');
            }
        }
        
        function addTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            
            if (!query) return;
            
            const mode = document.getElementById('query-mode').value;
            const topK = parseInt(document.getElementById('top-k').value);
            
            // Add user message
            addMessage('user', query);
            input.value = '';
            
            // Disable send button
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Processing...';
            
            // Show typing indicator
            addTypingIndicator();
            
            try {
                const endpoint = mode === 'agentic' ? '/query/agentic' : '/query/simple';
                const startTime = performance.now();
                
                const response = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        top_k: topK
                    })
                });
                
                const data = await response.json();
                const processingTime = ((performance.now() - startTime) / 1000).toFixed(2);
                
                removeTypingIndicator();
                
                if (response.ok) {
                    const metadata = {
                        mode: mode,
                        time: data.processing_time?.toFixed(2) || processingTime,
                        chunks: data.retrieved_chunks || 0,
                        iterations: data.iterations || 1,
                        confidence: data.confidence,
                        verification: data.verification_passed,
                        reasoning: data.reasoning_trace || [],
                        sources: data.sources || []
                    };
                    
                    addMessage('assistant', data.answer, metadata);
                } else {
                    addMessage('assistant', `Error: ${data.detail || 'Unknown error occurred'}`);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Network error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        document.getElementById('user-input').focus();
    </script>
</body>
</html>
