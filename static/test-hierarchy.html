<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Hierarchy UI Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .control-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .control-panel h3 {
            color: #a78bfa;
            margin-bottom: 15px;
        }
        
        .test-log {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #334155;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-success {
            color: #22c55e;
        }
        
        .log-error {
            color: #ef4444;
        }
        
        .log-info {
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Agent Hierarchy UI Test</h1>
            <p class="subtitle">Testing hierarchical display of main and sub-agents</p>
        </header>

        <div class="control-panel">
            <h3>Test Controls</h3>
            <button onclick="testSpawnSubAgent()">📌 Spawn Sub-Agent</button>
            <button onclick="testCompleteSubAgent()">✅ Complete Sub-Agent</button>
            <button onclick="testUpdateMetrics()">📊 Update Metrics</button>
            <button onclick="testToggleExpanded()">🔄 Toggle Expand</button>
            <button onclick="testClearHierarchy()">🗑️ Clear Hierarchy</button>
            <button onclick="testSimulateFullWorkflow()">▶️ Simulate Full Workflow</button>
            
            <h3 style="margin-top: 20px;">Test Log</h3>
            <div class="test-log" id="test-log"></div>
        </div>

        <div class="grid">
            <div id="agent-hierarchy-container" class="card"></div>
            <div id="metrics-panel-container" class="card"></div>
        </div>

        <div id="reasoning-timeline-container" class="card"></div>
    </div>

    <!-- Load Scripts -->
    <script src="js/state-manager.js"></script>
    <script src="js/ui-components.js"></script>

    <script>
        let testLog = [];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${message}`;
            testLog.push({ message: entry, type });
            
            const logEl = document.getElementById('test-log');
            const entryEl = document.createElement('div');
            entryEl.className = `log-entry log-${type}`;
            entryEl.textContent = entry;
            logEl.appendChild(entryEl);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function initializeStateManager() {
            if (!window.StateManagerInstance) {
                window.StateManagerInstance = new StateManager({
                    persistenceEnabled: false
                });
                addLog('✓ StateManager initialized', 'success');
            }
            return window.StateManagerInstance;
        }

        function initializeUIComponents() {
            if (!window.agentHierarchyPanel) {
                addLog('Initializing UI components...', 'info');
                
                // Add styles
                if (document.getElementById('hierarchy-styles') === null) {
                    const temp = document.createElement('div');
                    temp.innerHTML = HierarchyStyles;
                    document.head.appendChild(temp.firstElementChild);
                    addLog('✓ Styles injected', 'success');
                }
                
                window.agentHierarchyPanel = new AgentHierarchyPanel('agent-hierarchy-container');
                window.metricsPanel = new MetricsPanel('metrics-panel-container');
                window.reasoningTimeline = new ReasoningTimeline('reasoning-timeline-container');
                
                addLog('✓ UI components initialized', 'success');
            }
        }

        async function testSpawnSubAgent() {
            initializeStateManager();
            initializeUIComponents();
            
            const agentType = ['full_document', 'comparison', 'extraction'][Math.floor(Math.random() * 3)];
            const agentId = await window.StateManagerInstance.dispatch('recordSubAgentSpawn', {
                agentType: agentType,
                context: `Processing with ${agentType} strategy`,
                reasoning: [
                    'Detected full document scenario',
                    'Spawning isolated sub-agent',
                    'Initializing tools for ' + agentType
                ]
            });
            
            addLog(`✓ Spawned sub-agent: ${agentType} (ID: ${agentId})`, 'success');
        }

        async function testCompleteSubAgent() {
            initializeStateManager();
            const hierarchy = window.StateManagerInstance.getState('debug.agentHierarchy');
            
            if (!hierarchy.subAgents || hierarchy.subAgents.length === 0) {
                addLog('✗ No sub-agents to complete', 'error');
                return;
            }
            
            const lastAgent = hierarchy.subAgents[hierarchy.subAgents.length - 1];
            
            await window.StateManagerInstance.dispatch('recordSubAgentResult', {
                subAgentId: lastAgent.id,
                result: 'Successfully processed and retrieved relevant information',
                reasoning: [
                    'Analyzed full document structure',
                    'Extracted key entities and relationships',
                    'Generated comprehensive summary'
                ],
                metrics: {
                    retrievedDocuments: Math.floor(Math.random() * 10) + 3,
                    confidence: Math.random() * 0.4 + 0.6
                }
            });
            
            addLog(`✓ Completed sub-agent: ${lastAgent.type}`, 'success');
        }

        async function testUpdateMetrics() {
            initializeStateManager();
            
            await window.StateManagerInstance.dispatch('updateMainAgentMetrics', {
                metrics: {
                    duration: Math.random() * 5 + 2,
                    retrievedDocuments: Math.floor(Math.random() * 15) + 5,
                    iterations: Math.floor(Math.random() * 3) + 1,
                    confidence: Math.random() * 0.3 + 0.7
                }
            });
            
            addLog('✓ Updated main agent metrics', 'success');
        }

        async function testToggleExpanded() {
            initializeStateManager();
            await window.StateManagerInstance.dispatch('toggleAgentExpanded', { agentId: 'main' });
            addLog('✓ Toggled main agent expansion', 'success');
        }

        async function testClearHierarchy() {
            initializeStateManager();
            await window.StateManagerInstance.dispatch('clearAgentHierarchy');
            addLog('✓ Cleared agent hierarchy', 'success');
        }

        async function testSimulateFullWorkflow() {
            initializeStateManager();
            initializeUIComponents();
            
            addLog('Starting full workflow simulation...', 'info');
            
            // Update main agent
            await window.StateManagerInstance.dispatch('updateMainAgentReasoning', {
                reasoning: [
                    'Analyzing query: "What are the key features of X?"',
                    'Detected full document scenario',
                    'Spawning specialized sub-agents for different aspects'
                ]
            });
            
            // Spawn multiple sub-agents
            const subAgentIds = [];
            for (let i = 0; i < 2; i++) {
                const types = ['full_document', 'extraction', 'comparison'];
                const agentId = await window.StateManagerInstance.dispatch('recordSubAgentSpawn', {
                    agentType: types[i],
                    context: `Sub-agent ${i + 1} processing`,
                    reasoning: [
                        `Initializing ${types[i]} agent`,
                        'Loading relevant tools and context'
                    ]
                });
                subAgentIds.push(agentId);
                await new Promise(r => setTimeout(r, 500));
            }
            
            addLog(`✓ Spawned ${subAgentIds.length} sub-agents`, 'success');
            
            // Complete each sub-agent
            for (let i = 0; i < subAgentIds.length; i++) {
                const hierarchy = window.StateManagerInstance.getState('debug.agentHierarchy');
                const agent = hierarchy.subAgents[i];
                
                await window.StateManagerInstance.dispatch('recordSubAgentResult', {
                    subAgentId: agent.id,
                    result: `Analysis complete for aspect ${i + 1}: Found ${Math.floor(Math.random() * 5) + 3} relevant points`,
                    reasoning: [
                        'Processing complete',
                        'Aggregating results',
                        'Generating summary'
                    ],
                    metrics: {
                        retrievedDocuments: Math.floor(Math.random() * 10) + 3,
                        confidence: Math.random() * 0.3 + 0.7
                    }
                });
                
                await new Promise(r => setTimeout(r, 500));
            }
            
            addLog('✓ All sub-agents completed', 'success');
            
            // Update main agent metrics
            await window.StateManagerInstance.dispatch('updateMainAgentMetrics', {
                metrics: {
                    duration: 8.5,
                    retrievedDocuments: 15,
                    iterations: 3,
                    confidence: 0.85
                }
            });
            
            addLog('✓ Updated final metrics', 'success');
            addLog('✅ Workflow simulation complete!', 'success');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeStateManager();
            initializeUIComponents();
            addLog('Test page loaded. Use buttons to test UI components.', 'info');
        });
    </script>
</body>
</html>
